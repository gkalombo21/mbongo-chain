name: Go CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: go mod tidy

      - name: Build Mbongo-Chain
        run: go build ./cmd/mbongo-chain

      - name: Run tests
        run: go test ./... -v

      - name: Lint code
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout 5m

  notify:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Send failure notice
        run: echo "❌ Build or tests failed on Mbongo-Chain project"
