name: Go CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.22"

    - name: Install dependencies
      run: go mod tidy

    - name: Build Mbongo-Chain
      run: |
        cd cmd/mbongo-chain
        go build -v .
      working-directory: ${{ github.workspace }}

    - name: Run tests
      run: go test ./...
      working-directory: ${{ github.workspace }}

    - name: Lint code
      run: go fmt ./...
